<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <h1>TETRIS</h1>
        <div id="info-panel">
            <div class="info-box">
                <span class="info-label">SCORE</span>
                <span id="score-display">0</span>
            </div>
            <div class="info-box">
                <span class="info-label">LEVEL</span>
                <span id="level-display">1</span>
            </div>
            <div class="info-box">
                <span class="info-label">LINES</span>
                <span id="lines-display">0</span>
            </div>
        </div>
        <canvas id="tetris-board" width="300" height="600"></canvas>
        <div id="controls-hint">← → 이동 &nbsp;|&nbsp; ↑ 회전 &nbsp;|&nbsp; ↓ 빠른 낙하 &nbsp;|&nbsp; Space 즉시 낙하</div>
        <a href="contact.html" id="contact-btn">제휴 문의</a>
    </div>
    <div id="comments-section">
        <h2 id="comments-title">COMMENTS</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://j-260331.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
