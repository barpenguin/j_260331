<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #121212;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-family: 'Black Ops One', cursive;
            color: #00BFFF;
            font-size: 2rem;
            text-shadow: 0 0 16px rgba(0,191,255,0.6);
            margin-bottom: 0.4rem;
            letter-spacing: 0.1em;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        form {
            background: #1E1E1E;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            box-shadow: 0 0 30px rgba(0,191,255,0.1);
        }

        label {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 0.3rem;
            display: block;
        }

        input, textarea, select {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.95rem;
            padding: 0.65rem 0.9rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #00BFFF;
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        select option {
            background: #2a2a2a;
        }

        button[type="submit"] {
            font-family: 'Black Ops One', cursive;
            font-size: 1rem;
            background: #00BFFF;
            color: #121212;
            border: none;
            border-radius: 6px;
            padding: 0.85rem;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: background 0.2s, box-shadow 0.2s;
            margin-top: 0.3rem;
        }

        button[type="submit"]:hover {
            background: #FF4500;
            box-shadow: 0 0 16px rgba(255,69,0,0.5);
            color: #fff;
        }

        .back-link {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #555;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: #00BFFF; }
    </style>
</head>
<body>
    <h1>PARTNERSHIP</h1>
    <p class="subtitle">제휴 및 협업 문의를 남겨주세요.</p>

    <form action="https://formspree.io/f/mwvwbver" method="POST">
        <div>
            <label for="name">이름 / 회사명</label>
            <input type="text" id="name" name="name" placeholder="홍길동 / (주)예시" required>
        </div>
        <div>
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div>
            <label for="type">문의 유형</label>
            <select id="type" name="type">
                <option value="광고/마케팅">광고 / 마케팅</option>
                <option value="콘텐츠 제휴">콘텐츠 제휴</option>
                <option value="기술 협업">기술 협업</option>
                <option value="기타">기타</option>
            </select>
        </div>
        <div>
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" placeholder="제휴 목적 및 내용을 간략히 적어주세요." required></textarea>
        </div>
        <button type="submit">문의 보내기</button>
    </form>

    <a href="index.html" class="back-link">← 게임으로 돌아가기</a>
</body>
</html>
